name: pytest

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # uv provisions the Python version pinned in .python-version (3.12).
      - name: Install dependencies
        run: uv sync

      - name: Run tests
        # Headless SDL so anything that touches pygame works without a display.
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pytest tests/
